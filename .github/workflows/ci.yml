name: screenlingua-v5-ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate project structure
        run: |
          cd scaffold
          python scripts/v5_validate_project.py
          python scripts/run_acceptance_mock.py
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: |
          cd scaffold
          npm install
      - name: TypeScript check
        run: |
          cd scaffold
          npx tsc --noEmit
